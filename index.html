<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Listado de tareas </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href='app.css'>
</head>

<body>
    <header id="site-header">
        <div class="container">
            <div class="title-area">
                <h1 class="block-title"> Listado de Tareas </h1>
            </div>

            <nav class="navbar navbar-expand-md navbar-dark">
                <div class="container">

                    <!-- Nav-menu toggler - only mobile -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- Collapsible menu -->
                    <div class="collapse navbar-collapse" id="navMenu">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item list-inline-item linkedin">
                                <a class="btn btn-primary" href="https://www.linkedin.com/in/ivan-arasco-millan/"
                                    target="_blank">
                                    LinkedIn
                                </a>
                            </li>

                            <!-- Login, Register & Logout -->
                            <section id="login-container">
                                <!-- User not authenticated -->
                                <li class="nav-item list-inline-item login">
                                    <a class="btn btn-success" href="/login.html">Iniciar sesión</a>
                                </li>
                                <li class="nav-item list-inline-item register">
                                    <a class="btn btn-primary" href="#">¿Nuevo usuario?</a>
                                </li>
                                <!-- User authenticated -->
                                <li class="nav-item list-inline-item logout">
                                    <a class="btn btn-danger" href="#">Cerrar sesión</a>
                                </li>
                                <li class="nav-item ms-3 list-inline-item">
                                    <a href="#" class="btn btn-primary" id="user-cards">Ver Tarjetas asociadas</a>
                                </li>
                            </section>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="site-main-content">
        <div class="container">
            <!-- Task list -->
            <section class="row" id="task-list"></section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="d-flex menu-bot"></div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
</body>

</html>
