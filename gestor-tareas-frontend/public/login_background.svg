<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fff5ee"/>
      <stop offset="100%" stop-color="#fdeee2"/>
    </radialGradient>
    <radialGradient id="s1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b5d4f4" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#85b7eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#85b7eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#185FA5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#185FA5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#85b7eb" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#378ADD" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b5d4f4" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#85b7eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#85b7eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo base -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Forma grande arriba derecha -->
  <ellipse cx="1300" cy="-60" rx="380" ry="340" fill="url(#s1)" transform="rotate(-15 1300 -60)"/>

  <!-- Forma mediana abajo derecha -->
  <ellipse cx="1150" cy="820" rx="220" ry="190" fill="url(#s2)" transform="rotate(20 1150 820)"/>

  <!-- Forma pequeña abajo izquierda -->
  <ellipse cx="-30" cy="780" rx="160" ry="130" fill="url(#s3)" transform="rotate(-10 -30 780)"/>

  <!-- Forma pequeña arriba izquierda -->
  <ellipse cx="80" cy="120" rx="110" ry="90" fill="url(#s4)" transform="rotate(10 80 120)"/>
</svg>
