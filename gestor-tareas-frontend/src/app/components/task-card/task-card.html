<div class="card p-3 mb-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h3 class="card-title h6 mb-0">{{ task.title }}</h3>
        <span class="badge bg-info">{{ task.taskType }}</span>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <span class="badge" [ngClass]="{
        'bg-success':   task.taskStatus === 'Completed',
        'bg-warning':   task.taskStatus === 'Pending',
        'bg-primary':   task.taskStatus === 'InProgress',
        'bg-secondary': task.taskStatus === 'Cancelled'
    }">
            {{ task.taskStatus | taskState }}
        </span>


        <div class="d-flex gap-2">
            <!-- (click) llama a onComplete() que emite el @Output() completar -->
            <button class="btn btn-success btn-sm" [disabled]="task.taskStatus === 'Completed'" (click)="onComplete()">
                Completar
            </button>

            <!-- (click) llama a onDelete() que emite el @Output() eliminar -->
            <button class="btn btn-danger btn-sm" (click)="onDelete()">
                Eliminar
            </button>
        </div>
    </div>
</div>
