<div id="loginForm">
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm p-4" style="width: 360px">
      <div class="card-body">
        @if (error) {
        <div class="alert alert-danger py-2 mb-3">{{ error }}</div>
        }
        <h1 class="card-title mb-4 text-center">Iniciar sesión</h1>
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="usuario@empresa.com"
              [(ngModel)]="email">
            <div class="form-text">Nunca compartiremos tu email sin tu consentimiento.</div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Contraseña</label>
            <input type="password" id="password" name="password" class="form-control" [(ngModel)]="password">
          </div>
          <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
