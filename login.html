<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Inicio de sesión </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href='app.css'>
</head>

<body>
     <header id="site-header">
        <div class="container">
            <div class="title-area">
                <h1 class="block-title"> Listado de Tareas </h1>
            </div>

            <nav class="navbar navbar-expand-md navbar-dark">
                <div class="container">

                    <!-- Nav-menu toggler - only mobile -->
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <!-- Collapsible menu -->
                    <div class="collapse navbar-collapse" id="navMenu">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item list-inline-item linkedin">
                                <a class="btn btn-primary" href="https://www.linkedin.com/in/ivan-arasco-millan/"
                                    target="_blank">
                                    LinkedIn
                                </a>
                            </li>

                            <!-- Login, Register & Logout -->
                            <section id="login-container">
                                <!-- User not authenticated -->
                                <li class="nav-item list-inline-item register">
                                    <a class="btn btn-primary" href="#">¿Nuevo usuario?</a>
                                </li>
                            </section>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div id="loginForm">
        <div class="container d-flex justify-content-center
    align-items-center min-vh-100">
            <div class="card shadow-sm p-4" style="width: 360px">
                <div class="card-body">
                    <h1 class="card-title mb-4 text-center">Iniciar sesión</h1>
                    <form>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="usuario@empresa.com">
                            <div id="emailHelp" class="form-text">Nunca compartiremos tu email sin tu consentimiento.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="pass">Contraseña</label>
                            <input type="password" id="pass" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Entrar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="d-flex menu-bot"></div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js" defer></script>
</body>

</html>
